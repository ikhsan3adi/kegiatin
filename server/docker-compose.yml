services:
  postgres:
    image: postgres:17-alpine
    container_name: kegiatin-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: kegiatin
      POSTGRES_PASSWORD: kegiatin_dev
      POSTGRES_DB: kegiatin
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
